apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gizmosql-operator
  namespace: gizmosql-system
spec:
  interval: 30m
  releaseName: gizmosql-operator
  targetNamespace: gizmosql-system
  chartRef:
    kind: OCIRepository
    name: gizmosql-operator
  install:
    remediation:
      retries: 3
    crds: Create
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
    cleanupOnFail: true
    crds: CreateReplace
  values:
    prometheus:
      enable: true
