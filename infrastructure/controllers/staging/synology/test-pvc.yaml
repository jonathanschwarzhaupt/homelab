# apply manually to test using: kubectl apply -f test-pvc.yaml
# Test the pvc and deletion by following along:
# https://thedatabaseme.de/2023/09/08/csi-synology-using-synology-csi-driver-in-kubernetes-to-do-snapshots/
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: test-nfs-pvc
  namespace: default
spec:
  storageClassName: synology-csi-nfs-delete
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
