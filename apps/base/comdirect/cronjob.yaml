apiVersion: batch/v1
kind: CronJob
metadata:
  name: comdirect-auth
spec:
  schedule: "*/2 * * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 60
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 5

  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 90
      ttlSecondsAfterFinished: 3600
      template:
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile:
              type: RuntimeDefault

          containers:
            - name: comdirect-auth
              image: ghcr.io/jonathanschwarzhaupt/comdirect-auth:v0.1.1
              imagePullPolicy: IfNotPresent

              env:
                - name: COMDIRECT_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: comdirect-creds
                      key: COMDIRECT_USERNAME
                - name: COMDIRECT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: comdirect-creds
                      key: COMDIRECT_PASSWORD
                - name: COMDIRECT_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: comdirect-creds
                      key: COMDIRECT_CLIENT_ID
                - name: COMDIRECT_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: comdirect-creds
                      key: COMDIRECT_CLIENT_SECRET
                - name: FERNET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: comdirect-creds
                      key: FERNET_KEY
                - name: TOKEN_FILE_PATH
                  value: /data/token.json

              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi

              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]

              volumeMounts:
                - mountPath: /data
                  name: comdirect-data

          volumes:
            - name: comdirect-data
              persistentVolumeClaim:
                claimName: comdirect-data-pvc
