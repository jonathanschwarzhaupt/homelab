apiVersion: batch/v1
kind: CronJob
metadata:
  name: comdirect-auth
spec:
  schedule: "*/2 * * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 60
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 5

  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 90
      ttlSecondsAfterFinished: 3600
      template:
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault

          containers:
            - name: comdirect-auth
              image: jonathanschwarzhaupt/comdirect-auth:v0.1.0
              imagePullPolicy: IfNotPresent

              env:
                - name: COMDIRECT_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: comdirect-creds
                      key: COMDIRECT_USERNAME
                - name: COMDIRECT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: comdirect-creds
                      key: COMDIRECT_PASSWORD
                - name: COMDIRECT_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: comdirect-creds
                      key: COMDIRECT_CLIENT_ID
                - name: COMDIRECT_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: comdirect-creds
                      key: COMDIRECT_CLIENT_SECRET
                - name: OP_SERVICE_ACCOUNT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: op-service-account-apps-rw-creds
                      key: OP_SERVICE_ACCOUNT_TOKEN
                - name: OP_VAULT_ID
                  valueFrom:
                    secretKeyRef:
                      name: op-service-account-apps-rw-creds
                      key: OP_VAULT_ID

              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi

              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
